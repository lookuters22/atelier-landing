<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      (function(){
        if(window.location.pathname==='/') return;
        var t='light';try{t=localStorage.getItem('atelier-theme')||'light'}catch(e){}
        if(t==='system'){t=window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light'}
        var l=t==='light';
        var bg=l?'#ffffff':'#0a0a0a';
        var d=document.documentElement;
        d.style.background=bg;d.style.colorScheme=t;
        if(l)d.classList.add('light');
        document.write('<style>html,body,#root{background:'+bg+';color-scheme:'+t+'}</style>');
      })();
    </script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

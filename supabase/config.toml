project_id = "default"

# JWT verification (Supabase Edge): `verify_jwt` defaults to true for any function not listed below.
#
# verify_jwt = false (anonymous or non-JWT entrypoints only):
# - inngest — Inngest signs its own requests, not end-user JWT.
# - webhook-web — supports anonymous lead/support posts with ingress token; JWT optional per handler.
# - webhook-whatsapp — separate integration; do not change in Gmail hardening passes.
# - auth-google-callback — browser redirect from Google after OAuth; no app Authorization bearer.
#
# Gmail + Google OAuth init (gmail-send, gmail-list-labels, gmail-modify-message, auth-google-init): gateway
# verify_jwt only matches legacy HS256; projects on JWT Signing Keys (ES256) get 401 / non-2xx before handler runs.
# Auth is enforced in-handler via requirePhotographerIdFromJwt → supabase.auth.getUser() (see supabase/functions/_shared/authPhotographer.ts).
#
# Draft resolution (api-resolve-draft, webhook-approval): same ES256 issue — browser sends user JWT; gateway must not
# pre-verify HS256-only or approve/reject fails with UNAUTHORIZED_UNSUPPORTED_TOKEN_ALGORITHM before the handler runs.

[functions.api-resolve-draft]
verify_jwt = false

# Browser sends user JWT; gateway HS256 pre-check can block ES256 — validate in-handler (see authPhotographer.ts).
[functions.operator-studio-assistant]
verify_jwt = false

[functions.insert-operator-assistant-playbook-rule-candidate]
verify_jwt = false

[functions.insert-operator-assistant-task]
verify_jwt = false

[functions.insert-operator-assistant-memory]
verify_jwt = false

[functions.insert-operator-assistant-authorized-case-exception]
verify_jwt = false

[functions.webhook-approval]
verify_jwt = false

[functions.gmail-send]
verify_jwt = false

[functions.gmail-list-labels]
verify_jwt = false

[functions.gmail-modify-message]
verify_jwt = false

[functions.auth-google-init]
verify_jwt = false

[functions.inngest]
verify_jwt = false

[functions.webhook-web]
verify_jwt = false

[functions.webhook-whatsapp]
verify_jwt = false

[functions.auth-google-callback]
verify_jwt = false

# Gmail Pub/Sub push (Google-signed JWT optional; see GMAIL_PUBSUB_WEBHOOK_SECRET).
[functions.gmail-pubsub-webhook]
verify_jwt = false
